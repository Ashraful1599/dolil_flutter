name: dolil_flutter
description: "DolilBD – Legal Document Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.5.0
  http: ^1.2.1
  go_router: ^14.2.0
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  toastification: ^2.1.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  open_filex: ^4.4.1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  path: ^1.9.0
  file_picker: ^8.1.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
